# SPA + API reverse proxy. Static assets are served with SPA history fallback; /api is proxied to the backend so the
# browser stays same-origin (no CORS needed on the deployed site). ${PORT} and ${API_UPSTREAM} are rendered from env
# by nginx's docker-entrypoint (envsubst) at container start — see the client Dockerfile.
server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the fingerprinted assets; never cache index.html so new deploys are picked up.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy the API. Forwarded headers let the backend log the real client + build correct URLs.
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
    }

    # SPA history fallback: unknown routes return index.html so client-side navigation works on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
